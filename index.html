<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PK AutomateX | Admin Central</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand: #6366f1;
            --brand-dark: #4f46e5;
            --bg: #fdfdfd;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-dim: #64748b;
            --border: #f1f5f9;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.04), 0 8px 10px -6px rgba(0, 0, 0, 0.04);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text-main); padding-bottom: 90px; overflow-x: hidden; }

        /* --- TOP BAR --- */
        header {
            background: var(--surface);
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        .logo { font-size: 1.4rem; font-weight: 800; color: var(--text-main); display: flex; align-items: center; gap: 8px; }
        .logo span { color: var(--brand); }
        
        .status-pill {
            background: #f0fdf4;
            color: var(--success);
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 700;
            display: flex;
            align-items: center; gap: 6px;
        }
        .status-dot { width: 6px; height: 6px; border-radius: 3px; background: var(--success); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* --- CONTENT WRAPPER --- */
        .main-content { padding: 24px; max-width: 600px; margin: 0 auto; }

        .view-section { display: none; animation: fadeIn 0.4s ease-out; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- CARDS & STATS --- */
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; margin-top: 24px; }
        .section-header h2 { font-size: 1.1rem; font-weight: 700; color: var(--text-main); }
        .section-header a { font-size: 0.8rem; color: var(--brand); font-weight: 600; text-decoration: none; }

        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 24px; }
        .stat-card {
            background: var(--surface);
            padding: 20px;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border);
        }
        .stat-card small { color: var(--text-dim); font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; display: block; }
        .stat-card .val { font-size: 1.8rem; font-weight: 800; margin-top: 8px; color: var(--text-main); letter-spacing: -0.02em; }

        /* --- LIST ITEMS --- */
        .card-list { display: grid; gap: 12px; }
        .list-item {
            background: var(--surface);
            padding: 16px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02);
        }

        .icon-box {
            width: 44px; height: 44px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .info { flex: 1; min-width: 0; }
        .info h4 { font-size: 0.9rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .info p { font-size: 0.75rem; color: var(--text-dim); margin-top: 2px; }

        .meta { text-align: right; flex-shrink: 0; }
        .meta .top { font-size: 0.75rem; font-weight: 700; color: var(--brand); }
        .meta .bottom { font-size: 0.65rem; color: var(--text-dim); margin-top: 4px; }

        /* --- USER AVATARS --- */
        .avatar { width: 44px; height: 44px; border-radius: 22px; background: linear-gradient(135deg, var(--brand), #a5b4fc); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1rem; }

        /* --- BOTTOM NAV --- */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 12px 10px 24px 10px;
            border-top: 1px solid var(--border);
            z-index: 2000;
        }

        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            color: var(--text-dim); text-decoration: none; gap: 4px;
            font-size: 0.65rem; font-weight: 600; width: 60px;
        }
        .nav-item i { font-size: 1.4rem; font-style: normal; }
        .nav-item.active { color: var(--brand); }

        /* --- NOTIFICATION --- */
        #notif-trigger {
            background: #fffbeb; border: 1px solid #fef3c7; color: #92400e;
            padding: 12px; border-radius: 12px; font-size: 0.8rem; font-weight: 600;
            margin-bottom: 20px; text-align: center; cursor: pointer; display: none;
        }

        /* --- COLORS BY MODULE --- */
        .bg-floor { background: #eff6ff; color: #3b82f6; }
        .bg-newin { background: #fdf2f8; color: #db2777; }
        .bg-weekly { background: #f0fdf4; color: #10b981; }
        .bg-login { background: #f5f3ff; color: #7c3aed; }
        .bg-check { background: #fff7ed; color: #f97316; }

    </style>
</head>
<body>

<header>
    <div class="logo">🚀 PK <span>AutomateX</span></div>
    <div class="status-pill">
        <div class="status-dot"></div> Live
    </div>
</header>

<div class="main-content">
    <div id="notif-trigger" onclick="requestNotif()">
        🔔 Tap to enable real-time office alerts
    </div>

    <!-- HOME VIEW -->
    <section id="view-home" class="view-section active">
        <div class="stats-grid">
            <div class="stat-card">
                <small>Total SKUs</small>
                <div class="val" id="stat-skus">-</div>
            </div>
            <div class="stat-card">
                <small>Active Users</small>
                <div class="val" id="stat-users">-</div>
            </div>
        </div>

        <div class="section-header">
            <h2>Recent Activity</h2>
            <a href="#" onclick="showView('activity')">See All</a>
        </div>
        <div id="home-activity" class="card-list"></div>

        <div class="section-header">
            <h2>Team Online</h2>
            <a href="#" onclick="showView('team')">Manage</a>
        </div>
        <div id="home-team" class="card-list"></div>
    </section>

    <!-- ACTIVITY VIEW -->
    <section id="view-activity" class="view-section">
        <div class="section-header"><h2>Process History</h2></div>
        <div id="full-activity" class="card-list"></div>
    </section>

    <!-- TEAM VIEW -->
    <section id="view-team" class="view-section">
        <div class="section-header"><h2>Authorized Team</h2></div>
        <div id="full-team" class="card-list"></div>
    </section>

    <!-- ANALYTICS VIEW -->
    <section id="view-analytics" class="view-section">
        <div class="section-header"><h2>System Insights</h2></div>
        <div class="stat-card" style="margin-bottom: 16px;">
            <small>Total Operations</small>
            <div class="val" id="stat-ops">-</div>
        </div>
        <div class="stat-card">
            <p style="color: var(--text-dim); font-size: 0.8rem; text-align: center; padding: 20px;">
                Deeper analytics and charts coming in v3.1
            </p>
        </div>
    </section>
</div>

<nav class="bottom-nav">
    <a href="#" class="nav-item active" onclick="showView('home', this)"><i>🏠</i>Home</a>
    <a href="#" class="nav-item" onclick="showView('activity', this)"><i>⚡</i>Activity</a>
    <a href="#" class="nav-item" onclick="showView('team', this)"><i>👥</i>Team</a>
    <a href="#" class="nav-item" onclick="showView('analytics', this)"><i>📈</i>Analytics</a>
</nav>

<audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<script>
    const LIC_GIST = '55b7d332055b2a2715cfea29ea4fd1d7';
    const REP_GIST = 'df53c4543de477bc107fde0f605e0dc1';
    let lastId = null;

    function showView(id, el) {
        document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + id).classList.add('active');
        if (el) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
        window.scrollTo(0,0);
    }

    function requestNotif() {
        Notification.requestPermission().then(p => {
            if (p === 'granted') document.getElementById('notif-trigger').style.display = 'none';
        });
    }

    if (Notification.permission !== 'granted') document.getElementById('notif-trigger').style.display = 'block';

    async function sync() {
        try {
            const [lR, rR] = await Promise.all([
                fetch(`https://api.github.com/gists/${LIC_GIST}?t=${Date.now()}`),
                fetch(`https://api.github.com/gists/${REP_GIST}?t=${Date.now()}`)
            ]);
            const lData = JSON.parse(Object.values((await lR.json()).files)[0].content);
            const rData = JSON.parse(Object.values((await rR.json()).files)[0].content);
            render(lData, rData);
        } catch (e) { console.error(e); }
    }

    function render(l, r) {
        const reports = r.reports || [];
        const users = l.authorized || {};

        // Stats
        document.getElementById('stat-skus').innerText = reports.reduce((a,c) => a + (parseInt(c.skus)||0), 0).toLocaleString();
        document.getElementById('stat-users').innerText = Object.keys(users).length;
        document.getElementById('stat-ops').innerText = reports.length;

        // Notification logic
        if (reports.length > 0) {
            const top = reports[reports.length-1];
            if (lastId && top.id !== lastId) {
                document.getElementById('notif-sound').play().catch(e=>{});
                if (Notification.permission === 'granted') {
                    new Notification("🚀 " + top.module, { body: `${top.user}: ${top.file}` });
                }
            }
            lastId = top.id;
        }

        // Home Activity (Last 5)
        const recent = reports.slice().reverse();
        document.getElementById('home-activity').innerHTML = recent.slice(0, 5).map(r => renderItem(r)).join('');
        document.getElementById('full-activity').innerHTML = recent.map(r => renderItem(r)).join('');

        // Team
        const teamHTML = Object.entries(users).map(([hwid, info]) => `
            <div class="list-item">
                <div class="avatar">${info.name[0]}</div>
                <div class="info">
                    <h4>${info.name}</h4>
                    <p>HWID: ${hwid}</p>
                </div>
                <div class="meta">
                    <div class="top" style="color:var(--success)">● Online</div>
                </div>
            </div>
        `).join('');
        document.getElementById('home-team').innerHTML = teamHTML;
        document.getElementById('full-team').innerHTML = teamHTML;
    }

    function renderItem(r) {
        let cls = 'bg-check', icon = '⚙️';
        if (r.module.includes("Floorstock")) { cls = 'bg-floor'; icon = '📊'; }
        if (r.module.includes("New IN")) { cls = 'bg-newin'; icon = '📦'; }
        if (r.module.includes("Weekly")) { cls = 'bg-weekly'; icon = '🗓️'; }
        if (r.module.includes("Login")) { cls = 'bg-login'; icon = '🔑'; }

        return `
            <div class="list-item">
                <div class="icon-box ${cls}">${icon}</div>
                <div class="info">
                    <h4>${r.module}</h4>
                    <p>${r.file}</p>
                </div>
                <div class="meta">
                    <div class="top">${r.user}</div>
                    <div class="bottom">${r.time}</div>
                </div>
            </div>
        `;
    }

    sync();
    setInterval(sync, 15000);
</script>

</body>
</html>
